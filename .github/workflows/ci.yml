name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff lint
        run: ruff check src/ tests/
      - name: Run ruff format check
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pyyaml
      - name: Set up test vault
        run: |
          export TEST_VAULT=$(mktemp -d)
          echo "WIKI_VAULT=$TEST_VAULT" >> $GITHUB_ENV
          mkdir -p "$TEST_VAULT/concepts" "$TEST_VAULT/entities" "$TEST_VAULT/comparisons" "$TEST_VAULT/queries" "$TEST_VAULT/raw"
          echo "# Test Log" > "$TEST_VAULT/log.md"
          printf "# Index\n\n## Concepts\n\n## Entities\n\n## Comparisons\n\n## Queries\n\n## Raw Sources\n" > "$TEST_VAULT/index.md"
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore
