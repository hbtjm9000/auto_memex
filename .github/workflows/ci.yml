name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff lint
        run: ruff check scripts/ tests/
      - name: Run ruff format check
        run: ruff format --check scripts/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pyyaml
      - name: Set up test vault
        run: |
          export TEST_VAULT=$(mktemp -d)
          echo "WIKI_VAULT=$TEST_VAULT" >> $GITHUB_ENV
          mkdir -p "$TEST_VAULT/concepts" "$TEST_VAULT/entities" "$TEST_VAULT/comparisons" "$TEST_VAULT/queries" "$TEST_VAULT/raw"
          echo "# Test Log" > "$TEST_VAULT/log.md"
          printf "# Index\n\n## Concepts\n\n## Entities\n\n## Comparisons\n\n## Queries\n\n## Raw Sources\n" > "$TEST_VAULT/index.md"
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=scripts --cov-report=term-missing
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

  push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      - name: Check for changes
        id: check
        run: |
          if git diff --quiet HEAD~1 HEAD; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
            git push origin master
          fi